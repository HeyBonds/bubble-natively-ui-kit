<script>
  window.APP_CONFIG = { MIXPANEL_TOKEN: '67d776f0ab57ae77027280ff93e1bc32' };

  // Command queue — Bubble can call window.appUI.whenReady(fn) before
  // bundle.js loads. Queued callbacks execute once React is ready.
  // Pattern: Google GTM cmd.push / Segment analytics.js

  window.appUI.whenReady = function(fn) { window.appUI._q.push(fn); };

  (function() {
    var m = window.location.pathname.match(/\/version-[^\/]+/);
    var base = m ? m[0] + '/' : '/';
    var bust = '';
    try { var ff = sessionStorage.getItem('_force_fresh'); if (ff) { bust = '?_=' + ff; } } catch(e) {}

    link.rel = 'stylesheet';
    link.href = base + 'bundle.css' + bust;
    document.head.appendChild(link);
  })();
</script>

<!-- 2c. Text flash animation (used by Bubble workflows) -->
<style>
  @keyframes textFlash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .isFlashing {
    animation: textFlash 2000ms ease-in-out infinite;
  }
</style>

<script>
  window.startFlash = function(id) {
    if (!id) return;
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.add("isFlashing");
  };

  window.stopFlash = function(id) {
    if (!id) return;
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("isFlashing");
  };
</script>

<!-- 2d. App loader + Service Worker (REQUIRED — without this, the app won't start) -->
<script>
  (function() {
    // Ensure trailing slash on test branches so the page falls within the SW scope.
    // Without this, /version-xxxxx is outside scope /version-xxxxx/ and SW can't control the page.
    if (/\/version-[^\/]+$/.test(location.pathname)) {
      location.replace(location.pathname + '/' + location.search + location.hash);
      return;
    }
    var m = window.location.pathname.match(/\/version-[^\/]+/);
    var base = m ? m[0] + '/' : '/';
    // Cache-bust: if _force_fresh flag is set (by Eruda snippet), append ?_=timestamp to bypass CDN
    var bust = '';
    try { var ff = sessionStorage.getItem('_force_fresh'); if (ff) { bust = '?_=' + ff; sessionStorage.removeItem('_force_fresh'); console.log('[Loader] Cache-busting bundles:', bust); } } catch(e) {}
    var s = document.createElement('script');
    s.src = base + 'bundle.js' + bust;
    document.head.appendChild(s);
    if ('serviceWorker' in navigator) {
      // Only reload on SW update, not on first-ever install
      var hadController = !!navigator.serviceWorker.controller;
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!hadController || refreshing) return;
        refreshing = true;
        console.log('[SW] New version active — reloading');
        window.location.reload();
      });
      // updateViaCache:'none' bypasses HTTP/CDN cache for SW file checks
      navigator.serviceWorker.register(base + 'service-worker.js', { updateViaCache: 'none' })
        .then(function(reg) {
          console.log('[SW] Registered, scope:', reg.scope);
          reg.update(); // Force immediate update check
        })
        .catch(function(err) { console.error('[SW] Registration FAILED:', err.message); });
    }
  })();
</script>

<!-- 2e. Eruda debug console (auto-skipped on production) -->
<script>
  if (/\/version-/.test(location.pathname)) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/eruda';
    s.crossOrigin = 'anonymous';
    s.onload = function() { initEruda(); };
    document.head.appendChild(s);
  }
  function initEruda() {
  if (typeof eruda === 'undefined') return;
  eruda.init();

  // --- Debug Snippets (Eruda > Snippets tab > tap to run) ---

  eruda.get('snippets').add('Reset Storage', function () {
    window.appUI.resetAllStorage();
  }, 'Clear all Bonds storage (localStorage + NativelyStorage) and reload');

  eruda.get('snippets').add('SW Status', function () {
    console.log('[SW] Page URL:', location.href);
    console.log('[SW] Controller:', navigator.serviceWorker.controller ? navigator.serviceWorker.controller.scriptURL : 'NONE');
    navigator.serviceWorker.getRegistration().then(function (reg) {
      if (!reg) {
        console.log('[SW] getRegistration() → no match for current page scope');
      } else {
        console.log('[SW] Registration found:');
        console.log('  Scope:', reg.scope);
        console.log('  Active:', reg.active ? reg.active.scriptURL : 'none');
        console.log('  Waiting:', reg.waiting ? reg.waiting.scriptURL : 'none');
        console.log('  Installing:', reg.installing ? reg.installing.scriptURL : 'none');
      }
    });
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      console.log('[SW] Total registrations:', regs.length);
      regs.forEach(function (r, i) {
        console.log('  [' + i + '] scope=' + r.scope + ' active=' + (r.active ? r.active.scriptURL : 'none'));
      });
    });
  }, 'Full SW diagnostic: controller, registrations, scopes');

  eruda.get('snippets').add('SW Cache Contents', function () {
    caches.keys().then(function (names) {
      console.log('[SW] Cache names:', names);
      names.forEach(function (name) {
        caches.open(name).then(function (cache) {
          cache.keys().then(function (requests) {
            console.log('[SW] ' + name + ' (' + requests.length + ' entries):');
            requests.forEach(function (r) { console.log('  ', r.url); });
          });
        });
      });
    });
  }, 'List all cached URLs in every service worker cache');

  eruda.get('snippets').add('SW Force Register', function () {
    var m = location.pathname.match(/\/version-[^\/]+/);
    var base = m ? m[0] + '/' : '/';
    var swUrl = base + 'service-worker.js';
    console.log('[SW] Registering:', swUrl, 'scope:', base);
    navigator.serviceWorker.register(swUrl, { scope: base }).then(function (reg) {
      console.log('[SW] Registered! Scope:', reg.scope);
      console.log('[SW] Active:', reg.active ? reg.active.scriptURL : 'none');
      console.log('[SW] Installing:', reg.installing ? reg.installing.scriptURL : 'none');
      reg.update().then(function () { console.log('[SW] Update check triggered.'); });
    }).catch(function (err) {
      console.error('[SW] Registration failed:', err.message);
    });
  }, 'Force (re-)register the service worker and trigger update');

  eruda.get('snippets').add('Nuke Caches', function () {
    caches.keys().then(function (names) {
      console.log('[SW] Deleting', names.length, 'caches:', names);
      return Promise.all(names.map(function (n) { return caches.delete(n); }));
    }).then(function () {
      console.log('[SW] All caches deleted.');
      return navigator.serviceWorker.getRegistrations();
    }).then(function (regs) {
      return Promise.all(regs.map(function (r) { return r.unregister(); }));
    }).then(function () {
      console.log('[SW] All registrations unregistered. Reloading...');
      location.reload();
    });
  }, 'Delete ALL caches + unregister SWs + reload (nuclear option)');

  eruda.get('snippets').add('Force Fresh', function () {
    sessionStorage.setItem('_force_fresh', String(Date.now()));
    console.log('[Force] Flag set. Nuking caches + SWs...');
    caches.keys().then(function (names) {
      return Promise.all(names.map(function (n) { return caches.delete(n); }));
    }).then(function () {
      return navigator.serviceWorker.getRegistrations();
    }).then(function (regs) {
      return Promise.all(regs.map(function (r) { return r.unregister(); }));
    }).then(function () {
      console.log('[Force] Reloading with cache-bust...');
      location.reload();
    });
  }, 'Nuke SW caches + reload with CDN cache-busting (forces fresh bundle.js + bundle.css)');

  eruda.get('snippets').add('Bundle Headers', function () {
    fetch('/bundle.js', { method: 'HEAD', cache: 'no-cache' }).then(function (r) {
      console.log('--- bundle.js response headers ---');
      r.headers.forEach(function (v, k) { console.log('  ' + k + ':', v); });
    });
  }, 'Check what HTTP headers Bubble sends for bundle.js');

  eruda.get('snippets').add('Load Diagnostics', function () {
    var lines = [];
    var _log = function() { var line = Array.prototype.slice.call(arguments).join(' '); lines.push(line); console.log.apply(console, arguments); };

    // 1. Performance timing
    var t = performance.timing;
    _log('=== LOAD TIMING ===');
    _log('DNS:', (t.domainLookupEnd - t.domainLookupStart) + 'ms');
    _log('TCP:', (t.connectEnd - t.connectStart) + 'ms');
    _log('TLS:', (t.connectEnd - t.secureConnectionStart) + 'ms');
    _log('Server (TTFB):', (t.responseStart - t.requestStart) + 'ms');
    _log('Download:', (t.responseEnd - t.responseStart) + 'ms');
    _log('DOM Parse:', (t.domInteractive - t.domLoading) + 'ms');
    _log('Total to interactive:', (t.domInteractive - t.navigationStart) + 'ms');
    _log('Total to load:', (t.loadEventEnd - t.navigationStart) + 'ms');

    // 2. Resource loading breakdown (full URLs grouped by origin)
    _log('\n=== RESOURCES ===');
    var entries = performance.getEntriesByType('resource');
    entries.sort(function(a, b) { return b.duration - a.duration; });
    entries.slice(0, 20).forEach(function(e) {
      var cached = e.transferSize === 0 ? ' [CACHED]' : ' [' + Math.round(e.transferSize/1024) + 'KB]';
      _log('  ' + Math.round(e.duration) + 'ms' + cached + ' ' + e.name);
    });

    // 2b. Unique origins (for SW CACHEABLE_ORIGINS)
    _log('\n=== ORIGINS (for SW caching) ===');
    var origins = {};
    performance.getEntriesByType('resource').forEach(function(e) {
      try { var o = new URL(e.name).origin; origins[o] = (origins[o] || 0) + 1; } catch(x) {}
    });
    Object.keys(origins).sort().forEach(function(o) {
      _log('  ' + origins[o] + 'x ' + o);
    });

    // 3. HTML page size and dynamic content check
    _log('\n=== HTML PAGE ===');
    _log('Doc size:', Math.round(document.documentElement.outerHTML.length / 1024) + 'KB');
    var scripts = document.querySelectorAll('script[src]');
    _log('External scripts:', scripts.length);
    scripts.forEach(function(s) { _log('  ' + s.src.split('/').pop().split('?')[0]); });

    // 4. Check for dynamic Bubble content
    _log('\n=== BUBBLE DYNAMIC CHECK ===');
    var bubbleScripts = document.querySelectorAll('script:not([src])');
    var hasBubbleData = false;
    bubbleScripts.forEach(function(s) {
      if (s.textContent.indexOf('bubble_') > -1 || s.textContent.indexOf('appquery') > -1 || s.textContent.indexOf('user_data') > -1) {
        hasBubbleData = true;
        _log('  Found Bubble dynamic script:', s.textContent.substring(0, 100) + '...');
      }
    });
    if (!hasBubbleData) _log('  No Bubble dynamic data detected in HTML');

    // 5. SW status
    _log('\n=== SW ===');
    _log('Controller:', navigator.serviceWorker.controller ? 'YES' : 'NO');

    // Copy all output to clipboard
    var text = lines.join('\n');
    navigator.clipboard.writeText(text).then(function() {
      console.log('\n--- Copied to clipboard! Paste anywhere. ---');
    }).catch(function() {
      // Fallback for older WebViews
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      console.log('\n--- Copied to clipboard! Paste anywhere. ---');
    });
  }, 'Full load performance breakdown + auto-copy to clipboard');

  eruda.get('snippets').add('Test Crash', function () {
    console.log('[Test] Throwing uncaught error in 100ms...');
    setTimeout(function () { throw new Error('Eruda test crash'); }, 100);
  }, 'Throw an uncaught error to test Firebase crash tracking');

  eruda.get('snippets').add('Test Error', function () {
    if (typeof window.appUI._testLogError === 'function') {
      window.appUI._testLogError();
    } else {
      console.warn('[Test] appUI._testLogError not available — call sendToBubble("fake_fn","test") instead');
    }
  }, 'Log a non-fatal app_error to test Firebase error tracking');

  eruda.get('snippets').add('Storage Dump', function () {
    var keys = ['bonds_session_active', 'bonds_device_id', 'onboarding_complete', 'onboarding_state', 'credits_intro_seen', 'bonds_dark_mode', 'bonds_user_data', 'bonds_daily_question'];
    console.log('--- localStorage ---');
    keys.forEach(function (k) { console.log('  ' + k + ':', localStorage.getItem(k)); });
  }, 'Dump all Bonds localStorage keys');
  }
</script>
